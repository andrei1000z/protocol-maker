name: CI

# Runs on every push to master and on every pull request. Build is the
# slowest job so we keep it parallel with lint + test + typecheck.
#
# Vercel runs its own production build on push to master, so this CI is
# primarily a fast feedback signal for PRs — green here means the production
# build won't surprise. Cache lives under ~/.npm + Next's .next/cache so
# repeat runs land in 2-3 minutes.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Test runs don't hit live AI services; placeholder vars keep the build
  # passes intact for routes that import the SDK at module load.
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-key
  ANTHROPIC_API_KEY: ci-placeholder
  GROQ_API_KEY: ci-placeholder

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Lint surfaces existing warnings on master we already know about; allow
    # to fail so it doesn't block PRs while we clean them up incrementally.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Hash package-lock + every code path so a code change invalidates
          # the cache but a docs change doesn't.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - run: npm ci
      - run: npm run build
